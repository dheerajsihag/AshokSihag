<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>प्रथम पुण्य तिथि - अशोक सिहाग</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Noto Serif Devanagari', serif;
    background: radial-gradient(circle, #000000, #111);
    color: white;
    text-align: center;

    /* NO SCROLL */
    overflow: hidden;
    height: 100vh;
}

/* Center layout */
.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 10px;
}

/* Photo */
.photo {
    width: 160px;
    border: 4px solid gold;
    border-radius: 10px;
    box-shadow: 0 0 15px gold;
}

/* Text */
h1 { color: gold; font-size: 22px; margin: 5px; }
h2 { margin: 3px; font-size: 18px; }
h3 { color: #ccc; font-size: 14px; margin: 2px; }

/* Message */
.message {
    font-size: 14px;
    margin: 10px;
    line-height: 1.5;
}

/* Button */
button {
    padding: 10px 18px;
    background: gold;
    border: none;
    border-radius: 5px;
    margin-top: 8px;
    font-size: 14px;
}

/* Flower */
.flower {
    position: fixed;
    top: -20px;
    font-size: 18px;
    animation: fall linear infinite;
}

@keyframes fall {
    to { transform: translateY(100vh); }
}

/* Floating particles */
.particle {
    position: fixed;
    width: 3px;
    height: 3px;
    background: gold;
    border-radius: 50%;
    opacity: 0.7;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    from { transform: translateY(100vh); opacity:0; }
    to { transform: translateY(-10vh); opacity:1; }
}

/* DIYA */
.diya-left, .diya-right {
    position: fixed;
    bottom: 10px;
}

.diya-left { left: 10px; }
.diya-right { right: 10px; }

.diya-base {
    width: 60px;
    height: 25px;
    background: brown;
    border-radius: 50%;
}

.flame {
    width: 18px;
    height: 28px;
    background: radial-gradient(circle, yellow, orange, red);
    border-radius: 50%;
    box-shadow: 0 0 15px orange;
    margin: auto;
    animation: flicker 0.3s infinite;
}

@keyframes flicker {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="container">

<h1>प्रथम पुण्य तिथि</h1>

<h2>स्वर्गीय</h2>
<h2><b>श्री अशोक सिहाग जी</b></h2>

<h3>1 जनवरी 1966 – 16 अप्रैल 2025</h3>
<h3>16 अप्रैल 2026</h3>

<img src="photo.jpg" class="photo">

<div class="message">
🌹 श्रद्धांजलि 🌹<br>
आपकी स्मृति हमारे हृदय में सदैव जीवित रहेगी।<br>
🙏 भावपूर्ण श्रद्धांजलि 🙏<br>
— सिहाग परिवार
</div>

<button onclick="offerPushp()">🌸 पुष्प अर्पित करें</button>

</div>

<!-- DIYA LEFT -->
<div class="diya-left">
    <div class="flame"></div>
    <div class="diya-base"></div>
</div>

<!-- DIYA RIGHT -->
<div class="diya-right">
    <div class="flame"></div>
    <div class="diya-base"></div>
</div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="bhajan.mp3" type="audio/mpeg">
</audio>

<script>

/* Floating particles */
setInterval(() => {
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random()*window.innerWidth + "px";
    p.style.animationDuration = (5 + Math.random()*5)+"s";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),10000);
}, 400);

/* Pushp + Music */
function offerPushp() {

    // 🎵 Start music on click
    let music = document.getElementById("bgMusic");
    music.play();

    for (let i = 0; i < 20; i++) {
        let f = document.createElement("div");
        f.className = "flower";
        f.innerHTML = "🌸";
        f.style.left = Math.random()*window.innerWidth + "px";
        f.style.animationDuration = (3 + Math.random()*5)+"s";
        document.body.appendChild(f);
        setTimeout(()=>f.remove(),8000);
    }
}

</script>

</body>
</html>
